name: Auto Close Won't Fix Issues

on:
  issues:
    types: [labeled]

jobs:
  close-wontfix:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close issue if labeled wontfix
        if: github.event.label.name == 'wontfix'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
            console.log(`Issue #${context.issue.number} closed automatically due to 'wontfix' label`);